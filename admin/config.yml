backend:
  name: github
  repo: jlbrooks/jlbrooks.github.io
  branch: master
  base_url: https://sveltia-cms-auth.jlbrooks.workers.dev

# Required top-level fallback; per-collection media_folder overrides this
media_folder: assets/img/uploads
public_folder: /assets/img/uploads

collections:
  - name: posts
    label: Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    # Images go in a per-post folder matching the existing convention:
    # assets/img/YYYY-MM-DD-post-title/
    # Leading / = relative to repo root (not _posts/). {{slug}} expands to
    # the full entry slug e.g. 2026-05-16-my-post (no date duplication).
    media_folder: "/assets/img/{{slug}}"
    public_folder: "/assets/img/{{slug}}"
    editor:
      preview: false
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false }
      - label: Tags
        name: tags
        widget: select
        multiple: true
        required: false
        options:
          - trip-report
          - skiing
          - hiking
          - weekly-whats-up
          - home-automation
          - travel
          - tech
      # cover-img intentionally omitted: Beautiful Jekyll applies cover
      # header styling when the field is present even if empty.
      - { label: Comments, name: comments, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }
